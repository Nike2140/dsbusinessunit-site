backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/img/blog"
public_folder: "/assets/img/blog"

collections:
  - name: "posts"
    label: "Articles de blog"
    label_singular: "Article"
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: true
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - "Contrôle de gestion"
          - "Précomptabilité & Gestion financière"
          - "Pilotage administratif"
          - "Ressources Humaines"
          - "Achats & Performance fournisseurs"
          - "Supply Chain & Logistique"
      - { label: "Résumé (affiché sur la liste des articles)", name: "excerpt", widget: "text" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Date de publication", name: "date", widget: "datetime" }
      - { label: "Contenu de l'article", name: "body", widget: "markdown" }
